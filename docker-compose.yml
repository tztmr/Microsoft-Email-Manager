services:
  outlook-email-client:
    build: .
    container_name: outlook-email-api
    ports:
      - "8073:8000"
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=8000
      - DATA_DIR=/app/data
      - ACCOUNTS_FILE=/app/data/accounts.json
      - TRUST_PROXY_HEADERS=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/state')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - outlook-network

networks:
  outlook-network:
    driver: bridge

volumes:
  outlook-data:
    driver: local
